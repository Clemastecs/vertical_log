            <h1>el príncep de les maduixes </h1>
            <p class="subtitle">Llistat de vies d'escalada</p>
        </header>

        <main>
            <div id="loading" class="status-msg">Carregant vies...</div>
            <div id="error" class="status-msg error mono" style="display: none;">Failed to load data.</div>

            <div id="stats-summary" class="stats-container">
                <!-- Estadístiques es carregaran aquí -->
            </div>

            <!-- Toggle Button -->
            <div class="toggle-stats-wrapper">
                <button id="toggle-stats-btn" class="btn-more-stats">
                    més estadístiques <svg class="icon" aria-hidden="true"><use href="#i-chevron-down"></use></svg>
                </button>
            </div>

            <!-- Extra Stats Section (Hidden by default) -->
            <div id="extra-stats-container" class="hidden">
                <!-- Years Chart Section -->
                <div id="years-chart-container" class="chart-wrapper">
                    <h3 class="chart-title">distribució per any</h3>
                    <canvas id="yearsChart"></canvas>
                </div>

                <!-- Grades Chart Section -->
                <div id="chart-outer-container" class="chart-wrapper">
                    <h3 class="chart-title">distribució de graus</h3>
                    <canvas id="zonesChart"></canvas>
                </div>

                <!-- Seasons Chart Section -->
                <div class="chart-wrapper">
                    <h3 class="chart-title">distribució per estació</h3>
                    <canvas id="seasonsChart"></canvas>
                </div>
            </div>

            <!-- Map Section -->
            <div id="map-container" class="map-container">
                <div id="map"></div>
            </div>

            <div class="sort-controls">
                <label for="mobile-sort">Ordenar per:</label>
                <select id="mobile-sort">
                    <option value="0-desc">Nº ↓</option>
                    <option value="0-asc">Nº ↑</option>
                    <option value="1-asc">Nom A-Z</option>
                    <option value="1-desc">Nom Z-A</option>
                    <option value="2-asc">Grau ↑</option>
                    <option value="2-desc">Grau ↓</option>
                    <option value="6-desc">Data recent</option>
                    <option value="6-asc">Data antiga</option>
                </select>
                <button id="search-toggle" class="icon-btn" title="Cerca"><svg class="icon"
                        aria-hidden="true"><use href="#i-search"></use></svg></button>
                <button class="refresh-btn js-refresh" type="button" title="Actualitza des del full"
                    aria-label="Actualitza des del full"><svg class="icon" aria-hidden="true"><use
                            href="#i-refresh"></use></svg></button>
            </div>

            <div class="search-wrapper" id="search-wrapper">
                <input type="text" id="search-input" placeholder="Cerca via, grau, paret, zona...">
            </div>

            <div class="table-wrapper">
                <table id="vies-table">
                    <thead>
                        <tr>
                            <th data-col="0">Nº</th>
                            <th data-col="1">Nom</th>
                            <th data-col="2">Grau</th>
                            <th data-col="3">Metres</th>
                            <th data-col="4">Agulla/Paret</th>
                            <th data-col="5">Zona</th>
                            <th></th>
                            <th data-col="6">Data</th>
                            <th>Enllaç</th>
                            <th class="refresh-col"><button class="refresh-btn js-refresh" type="button"
                                    title="Actualitza des del full" aria-label="Actualitza des del full"><svg
                                        class="icon" aria-hidden="true"><use href="#i-refresh"></use></svg></button><a
                                    id="edit-sheet" class="refresh-btn"
                                    href="https://docs.google.com/spreadsheets/d/1oCcDi61G43sOByR2wFP3d1LBLx4YN_suXttxySiF6JE/edit?gid=1679149998#gid=1679149998"
                                    target="_blank"
                                    rel="noopener" title="Edita la llista al full" aria-label="Edita la llista al full"><svg
                                        class="icon" aria-hidden="true"><use href="#i-pen"></use></svg></a></th>
                        </tr>
                    </thead>
                    <tbody id="vies-body">
                        <!-- Les dades es carregaran aquí -->
                    </tbody>
                </table>
            </div>
        </main>
